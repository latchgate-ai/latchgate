[advisories]
# Yanked crates are flagged here. Fix by running `cargo update` when they appear.
#
# Suppression policy
# ------------------
# Every suppressed advisory MUST use structured form { id, reason } — bare string
# IDs carry no rationale and are not allowed.
#
# Each entry MUST include:
#   # review_before: YYYY-MM-DD  — team must re-triage on or before this date:
#     (a) confirm upstream blocker still exists and push the date forward, or
#     (b) remove suppression because the upstream fix has landed.
#
# Owner: platform-security. Review cadence: quarterly or on upstream release.
ignore = [
    # review_before: 2026-10-01
    # Blocker: object_store 0.14 pins quick-xml ^0.40; 0.41 is out of semver
    # range so Cargo patches cannot override. Awaiting upstream object_store
    # release with quick-xml ^0.41.
    # Risk: both CVEs are DoS via attacker-controlled XML. object_store only
    # parses XML from trusted cloud provider API responses (AWS/GCP/Azure),
    # not user-supplied input — exploitation requires a compromised provider.
    { id = "RUSTSEC-2026-0194", reason = "quick-xml DoS (duplicate attrs); only parsed from trusted cloud provider responses; blocked on upstream object_store bump to quick-xml ^0.41" },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml DoS (unbounded ns alloc); only parsed from trusted cloud provider responses; blocked on upstream object_store bump to quick-xml ^0.41" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    # borrow-or-share (via jsonschema => fluent-uri => referencing)
    "MIT-0",
    # foldhash (via hashbrown => wasmtime)
    "Zlib",
    # quoted_printable (via lettre)
    "0BSD",
    # webpki-roots (via sqlx-core => sqlx)
    "CDLA-Permissive-2.0",
    # xxhash-rust (via redis 1.0) — Boost Software License, OSI-approved, permissive
    "BSL-1.0",
    # option-ext (via directories => dirs-sys) — weak copyleft, file-level only
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

# Transitive version splits from incompatible upstream crates.
# Each entry documents which upstream dep chain causes the split.
skip = [
    # ── getrandom version splits ──────────────────────────────────────────────

    # getrandom 0.2 (ring => jsonwebtoken) vs 0.4 (uuid v1)
    { name = "getrandom", version = "0.2" },

    # getrandom 0.3 (ahash => jsonschema) vs 0.4 (uuid, tempfile)
    { name = "getrandom", version = "0.3" },

    # ── Crypto ecosystem ──────────────────────────────────────────────────────
    # ed25519-dalek 2.x and p256 0.13 depend on digest 0.10 / sha2 0.10
    # (rand_core 0.6 ecosystem). The workspace uses sha2 0.11 / digest 0.11.
    # These splits resolve when ed25519-dalek 3.0 and p256 0.14 ship with
    # digest 0.11 support. Until then both stacks coexist.

    { name = "block-buffer",   version = "0.10" },
    { name = "const-oid",      version = "0.9" },
    { name = "cpufeatures",    version = "0.2" },
    { name = "crypto-common",  version = "0.1" },
    { name = "digest",         version = "0.10" },
    { name = "hmac",           version = "0.12" },
    { name = "sha2",           version = "0.10" },
    { name = "spin",           version = "0.9" },

    # ── wasmtime 45 internal duplicates ────────────────────────────────────────
    # wasmtime's internal crate ecosystem (cranelift, wasm-tools, wit-parser)
    # pulls its own versions of several shared crates. These cannot be unified
    # without upstream wasmtime changes.

    { name = "foldhash",       version = "0.1" },
    { name = "hashbrown",      version = "0.14" },
    { name = "hashbrown",      version = "0.15" },
    { name = "hashbrown",      version = "0.16" },
    { name = "thiserror",      version = "1" },
    { name = "thiserror-impl", version = "1" },
    { name = "toml",           version = "0.9" },
    { name = "toml_datetime",  version = "0.7" },
    { name = "wasm-encoder",   version = "0.248" },
    { name = "wast",           version = "35" },
    { name = "winnow",         version = "0.7" },
    { name = "wit-bindgen",    version = "0.51" },

    # wasmtime 45 pulls reqwest 0.13 transitively; workspace pins 0.12
    { name = "reqwest",        version = "0.12" },

    # ── windows ecosystem ──────────────────────────────────────────────────────
    # windows-sys / windows-targets version splits (transitive, cannot be unified)
    #
    #   0.48  <- sqlx => sqlx-postgres => etcetera => windows-sys 0.48
    #   0.52  <- ring => jsonwebtoken => windows-sys 0.52
    #   0.61  <- mio => tokio / clap / tracing-subscriber => windows-sys 0.61
    #
    # windows-targets / windows_* arch crates track windows-sys versions:
    #   0.48  <- windows-targets 0.48 (sqlx chain)
    #   0.52  <- windows-targets 0.52 (ring/jsonwebtoken chain)
    { name = "windows-sys", version = "0.48" },
    { name = "windows-sys", version = "0.52" },
    { name = "windows-targets", version = "0.48" },
    { name = "windows-targets", version = "0.52" },

    # windows_* arch crates — skip each minor series present in the lock file
    { name = "windows_aarch64_gnullvm", version = "0.48" },
    { name = "windows_aarch64_gnullvm", version = "0.52" },
    { name = "windows_aarch64_msvc",    version = "0.48" },
    { name = "windows_aarch64_msvc",    version = "0.52" },
    { name = "windows_i686_gnu",        version = "0.48" },
    { name = "windows_i686_gnu",        version = "0.52" },
    { name = "windows_i686_msvc",       version = "0.48" },
    { name = "windows_i686_msvc",       version = "0.52" },
    { name = "windows_x86_64_gnu",      version = "0.48" },
    { name = "windows_x86_64_gnu",      version = "0.52" },
    { name = "windows_x86_64_gnullvm",  version = "0.48" },
    { name = "windows_x86_64_gnullvm",  version = "0.52" },
    { name = "windows_x86_64_msvc",     version = "0.48" },
    { name = "windows_x86_64_msvc",     version = "0.52" },

    # ── Other transitive splits ────────────────────────────────────────────────

    # sqlx => hashlink 0.10 vs wasmtime => hashlink 0.11
    { name = "hashlink",       version = "0.10" },

    # wasmtime/rustix UEFI target support
    { name = "r-efi",          version = "5" },

    # directories => redox_users 0.4 vs newer chain
    { name = "redox_users",    version = "0.4" },

    # lapin => amq-protocol-tcp => tcp-stream => p12-keystore => x509-parser =>
    # asn1-rs / der-parser => nom 7; lettre => nom 8
    { name = "nom", version = "7" },

    # ratatui / wasmtime => itertools 0.14 vs object_store 0.14 => itertools 0.15
    { name = "itertools", version = "0.14" },

    # object_store 0.14 / regorus / wasmtime 45 (via cap-rand) /
    # lapin => tcp-stream => p12-keystore pull rand 0.10 transitively; latchgate pins
    # rand 0.8 (rand_core 0.6 compat with ed25519-dalek 2.x / p256 0.13)
    { name = "rand",       version = "0.10" },
    { name = "rand_core",  version = "0.10" },

    # sqlx => webpki-roots 0.26 vs lettre => webpki-roots 1.0
    { name = "webpki-roots", version = "0.26" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
