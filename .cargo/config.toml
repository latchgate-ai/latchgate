# Fast linker configuration — optional speedup, not required to build.
#
# Linux: install lld (always available) or mold (faster, optional)
#   sudo apt install clang lld    # Ubuntu/Debian — sufficient
#   sudo apt install mold         # optional, noticeably faster
#
#   To use mold, add to your personal ~/.cargo/config.toml (don't commit that):
#   [target.x86_64-unknown-linux-gnu]
#   linker = "clang"
#   rustflags = ["-C", "link-arg=-fuse-ld=mold"]
#
# Windows (MSVC): rust-lld is bundled with rustup — no install needed.

# Compilation cache — optional, major speedup for clean builds.
#
# sccache caches compiled C objects (libsqlite3-sys, cranelift) and Rust
# crate artifacts across `cargo clean` invocations. Especially impactful
# for rusqlite "bundled" which recompiles SQLite from C on every clean.
#
# Install:  cargo install sccache --locked
# Enable:   export RUSTC_WRAPPER=sccache
#
# Not set here because a hardcoded rustc-wrapper breaks builds when sccache
# is not installed. Set it in your shell profile or personal
# ~/.cargo/config.toml instead.

# ── Linux x86-64 ──────────────────────────────────────────────────────────────
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld", "-C", "split-debuginfo=unpacked"]

# ── Linux aarch64 (e.g. AWS Graviton) ─────────────────────────────────────────
[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld", "-C", "split-debuginfo=unpacked"]

# ── Windows MSVC ──────────────────────────────────────────────────────────────
# rust-lld ships with rustup — no extra install required.
[target.x86_64-pc-windows-msvc]
linker = "rust-lld"

[target.aarch64-pc-windows-msvc]
linker = "rust-lld"
