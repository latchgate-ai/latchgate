# asana_create — create tasks and subtasks in Asana.
#
# Medium risk: creates work items in project management.

action_id: "asana_create"
tags: ["agent", "team"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: POST
  url_template: "https://app.asana.com/api/1.0/{{endpoint}}"
  headers:
    Content-Type: "application/json"
    Accept: "application/json"
  body_template:
    data: "{{data}}"

io:
  request_schema:
    type: object
    required:
      - endpoint
      - data
    additionalProperties: false
    properties:
      endpoint:
        type: string
        minLength: 1
        maxLength: 512
        description: "Asana API path, e.g. tasks, tasks/12345/subtasks"
      data:
        type: string
        maxLength: 65536
        description: "Task data (JSON string with name, projects, assignee, etc.)."
  max_request_bytes: 65536
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 5

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "app.asana.com"

secrets:
  - name: "ASANA_ACCESS_TOKEN"
    required: true

risk_level: "medium"
verifier_kind: http_status

declared_side_effects:
  - "http_write"
