# gitlab_read — read GitLab projects, issues, and merge requests.
#
# Low risk: read-only API access.

action_id: "gitlab_read"
tags: ["agent", "team", "research"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: GET
  url_template: "https://gitlab.com/api/v4/{{endpoint}}"
  headers:
    Accept: "application/json"

io:
  request_schema:
    type: object
    required:
      - endpoint
    additionalProperties: false
    properties:
      endpoint:
        type: string
        minLength: 1
        maxLength: 512
        description: "GitLab API path, e.g. projects/123/issues, projects/123/merge_requests"
  max_request_bytes: 4096
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 5

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "gitlab.com"

secrets:
  - name: "GITLAB_TOKEN"
    required: false

risk_level: "low"
verifier_kind: http_status

declared_side_effects:
  - "http_read"
