# http_fetch — read-only HTTP GET action.
#
# Low risk: reads external data, no write side-effects.
# Egress: proxy_allowlist — the action needs network, but only through the
# controlled proxy with a domain allowlist.
#
# Risk rationale: read-only, no auth required, no PII exposure.
#
# Uses builtin:http_api template — same pattern as all other HTTP actions.
# For dynamic headers or HEAD method, create a custom action.
#
# Generic action — ships with safe read-only defaults (httpbin, GitHub
# public API, Wikipedia, Hacker News). Operators should add domains for
# their environment and narrow with egress_runtime_allowlist in production.

action_id: "http_fetch"
tags:
  - "agent"
  - "team"
  - "research"
  - "data-pipeline"
  - "coding"
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: GET
  url_template: "{{url}}"
  headers:
    Accept: "application/json"

io:
  request_schema:
    type: object
    required:
      - url
    additionalProperties: false
    properties:
      url:
        type: string
        format: uri
        minLength: 1
        maxLength: 2048
        description: "Target URL. Must be http or https. Private/internal ranges are blocked by the SSRF guard."
  max_request_bytes: 65536
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 10

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "httpbin.org"
    - "api.github.com"
    - "*.wikipedia.org"
    - "hacker-news.firebaseio.com"

secrets: []

risk_level: "low"
verifier_kind: http_status

declared_side_effects:
  - "http_read"
