# wikipedia_read — read Wikipedia articles and API data.
#
# Low risk: read-only access to Wikipedia. Stable domain.

action_id: "wikipedia_read"
tags: ["agent", "team", "research"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: GET
  url_template: "https://{{lang}}.wikipedia.org/api/rest_v1/{{endpoint}}"
  headers:
    Accept: "application/json"
    User-Agent: "LatchGate/1.0"

io:
  request_schema:
    type: object
    required:
      - lang
      - endpoint
    additionalProperties: false
    properties:
      lang:
        type: string
        minLength: 2
        maxLength: 10
        pattern: "^[a-z]{2,10}$"
        description: "Wikipedia language code, e.g. en, pl, de."
      endpoint:
        type: string
        minLength: 1
        maxLength: 512
        description: "REST API path, e.g. page/summary/Alan_Turing"
  max_request_bytes: 4096
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 5

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "*.wikipedia.org"

secrets: []

risk_level: "low"
verifier_kind: http_status

declared_side_effects:
  - "http_read"
