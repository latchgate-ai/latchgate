# asana_read — read Asana tasks, projects, and workspaces.
#
# Low risk: read-only project management data.

action_id: "asana_read"
tags: ["agent", "team", "research"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: GET
  url_template: "https://app.asana.com/api/1.0/{{endpoint}}"
  headers:
    Accept: "application/json"

io:
  request_schema:
    type: object
    required:
      - endpoint
    additionalProperties: false
    properties:
      endpoint:
        type: string
        minLength: 1
        maxLength: 512
        description: "Asana API path, e.g. tasks/12345, projects/12345/tasks, workspaces"
  max_request_bytes: 4096
  max_response_bytes: 2097152

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 10

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "app.asana.com"

secrets:
  - name: "ASANA_ACCESS_TOKEN"
    required: true

risk_level: "low"
verifier_kind: http_status

declared_side_effects:
  - "http_read"
