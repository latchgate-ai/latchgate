# s3_write — write or delete objects in AWS S3.
#
# High risk: mutates or deletes external storage objects.
# Split from the former s3_operations to enforce read/write separation.
# Requires named principal or approval.

action_id: "s3_write"
tags: ["data-pipeline"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"

io:
  request_schema:
    type: object
    properties:
      url:
        type: string
        format: uri
        minLength: 1
        maxLength: 2048
        description: "S3 pre-signed URL or IAM-authed endpoint."
      method:
        type: string
        enum:
          - PUT
          - DELETE
        description: "HTTP method. Only write/delete operations."
      headers:
        type: object
        additionalProperties:
          type: string
        maxProperties: 20
        description: "Request headers (Content-Type, x-amz-*, etc.)."
      body:
        type: string
        maxLength: 5242880
        description: "Object content for PUT operations."
      timeout_ms:
        type: integer
        minimum: 1000
        maximum: 60000
        default: 30000
        description: "Request timeout in milliseconds."
    required:
      - url
      - method
    additionalProperties: false
  response_schema:
    type: object
    required: [ok]
    properties:
      ok: { type: boolean }
      data:
        type: object
        properties:
          status: { type: integer }
          etag: { type: string }
  max_request_bytes: 5242880
  max_response_bytes: 4096

resource_limits:
  fuel: 10000000
  memory_mb: 256
  timeout_seconds: 60
  max_io_calls: 5

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "*.s3.amazonaws.com"
    - "*.s3.us-east-1.amazonaws.com"
    - "*.s3.us-east-2.amazonaws.com"
    - "*.s3.us-west-1.amazonaws.com"
    - "*.s3.us-west-2.amazonaws.com"
    - "*.s3.eu-west-1.amazonaws.com"
    - "*.s3.eu-west-2.amazonaws.com"
    - "*.s3.eu-central-1.amazonaws.com"
    - "*.s3.ap-southeast-1.amazonaws.com"
    - "*.s3.ap-northeast-1.amazonaws.com"
    # Operators: add your region via 'latchgate domains add' if not listed.

secrets:
  - name: "AWS_ACCESS_KEY_ID"
    required: false
  - name: "AWS_SECRET_ACCESS_KEY"
    required: false

risk_level: "high"
verifier_kind: http_status
verification_config:
  required_fields: ["ok"]

declared_side_effects:
  - "http_write"
