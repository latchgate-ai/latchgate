# google_tasks_list — list Google Tasks.
#
# Low risk: read-only.

action_id: "google_tasks_list"
version: "1.0.0"
tags: ["agent", "team", "research"]
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: GET
  url_template: "https://tasks.googleapis.com/tasks/v1/{{endpoint}}"
  headers:
    Accept: "application/json"

io:
  request_schema:
    type: object
    required:
      - endpoint
    additionalProperties: false
    properties:
      endpoint:
        type: string
        minLength: 1
        maxLength: 512
        description: "Google Tasks API path, e.g. users/@me/lists, lists/LISTID/tasks"
  max_request_bytes: 4096
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 15
  max_io_calls: 5

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "tasks.googleapis.com"

secrets:
  - name: "GOOGLE_ACCESS_TOKEN"
    required: true

risk_level: "low"
verifier_kind: http_status

declared_side_effects:
  - "http_read"
