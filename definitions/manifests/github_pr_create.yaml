# github_pr_create — create a GitHub pull request.
#
# High risk: creates PRs visible to repository collaborators. Requires approval.

action_id: "github_pr_create"
tags: ["agent", "team", "coding"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: POST
  url_template: "https://api.github.com/repos/{{owner}}/{{repo}}/pulls"
  headers:
    Accept: "application/vnd.github.v3+json"
    Content-Type: "application/json"
  body_template:
    title: "{{title}}"
    body: "{{body}}"
    head: "{{head}}"
    base: "{{base}}"

io:
  request_schema:
    type: object
    required:
      - owner
      - repo
      - title
      - head
      - base
    additionalProperties: false
    properties:
      owner:
        type: string
        minLength: 1
        maxLength: 39
      repo:
        type: string
        minLength: 1
        maxLength: 100
      title:
        type: string
        minLength: 1
        maxLength: 256
      body:
        type: string
        maxLength: 65536
        default: ""
      head:
        type: string
        minLength: 1
        maxLength: 256
        description: "Branch containing changes."
      base:
        type: string
        minLength: 1
        maxLength: 256
        description: "Branch to merge into."
  response_schema:
    type: object
    required: [ok]
    additionalProperties: false
    properties:
      ok: { type: boolean }
      data:
        type: object
        properties:
          number: { type: integer, description: "Created pull request number." }
          html_url: { type: string, description: "URL of the created PR." }
          id: { type: integer, description: "GitHub PR ID." }
  max_request_bytes: 65536
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 3

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "api.github.com"

secrets:
  - name: "GITHUB_TOKEN"
    required: true

risk_level: "high"
verifier_kind: http_status
verification_config:
  required_fields: ["ok", "data"]

declared_side_effects:
  - "http_write"
