# gmail_read — read a specific Gmail message by ID.
#
# Medium risk: authenticated read, exposes email content single message access.

action_id: "gmail_read"
tags: ["team", "research"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: GET
  url_template: "https://gmail.googleapis.com/gmail/v1/users/me/messages/{{message_id}}?format={{format}}"
  headers:
    Accept: "application/json"

io:
  request_schema:
    type: object
    required:
      - message_id
    additionalProperties: false
    properties:
      message_id:
        type: string
        minLength: 1
        maxLength: 64
        description: "Gmail message ID."
      format:
        type: string
        enum:
          - full
          - metadata
          - minimal
          - raw
        default: "full"
        description: "Response format."
  max_request_bytes: 4096
  max_response_bytes: 2097152

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 3

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "gmail.googleapis.com"

secrets:
  - name: "GOOGLE_ACCESS_TOKEN"
    required: true

risk_level: "medium"
verifier_kind: http_status

declared_side_effects:
  - "http_read"
