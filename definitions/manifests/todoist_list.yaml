# todoist_list — list Todoist tasks and projects.
#
# Low risk: read-only.

action_id: "todoist_list"
tags: ["agent", "team", "research"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: GET
  url_template: "https://api.todoist.com/rest/v2/{{endpoint}}"
  headers:
    Accept: "application/json"

io:
  request_schema:
    type: object
    required:
      - endpoint
    additionalProperties: false
    properties:
      endpoint:
        type: string
        minLength: 1
        maxLength: 256
        description: "Todoist API path, e.g. tasks, projects, tasks?filter=today"
  max_request_bytes: 4096
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 15
  max_io_calls: 5

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "api.todoist.com"

secrets:
  - name: "TODOIST_API_TOKEN"
    required: true

risk_level: "low"
verifier_kind: http_status

declared_side_effects:
  - "http_read"
