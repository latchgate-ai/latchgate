# http_sensitive_read — authenticated GET for sensitive data (PII, financial).
#
# High risk: even though this is a read, it accesses sensitive data that
# requires human approval before the request is made.
#
# Risk rationale: accesses financial/PII data, auth required.
#
# Generic action — ships with empty allowed_domains.
# Operators must configure domains for their environment.
# See manifests/_examples/http_sensitive_read.yaml for a demo configuration.

action_id: "http_sensitive_read"
tags: ["agent", "team"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: GET
  url_template: "{{url}}"
  headers:
    Accept: "application/json"

io:
  request_schema:
    type: object
    properties:
      url:
        type: string
        format: uri
        minLength: 1
        maxLength: 2048
        description: "Sensitive data endpoint (PII, financial)."
    required:
      - url
    additionalProperties: false
  response_schema:
    type: object
    required: [ok]
    additionalProperties: false
    properties:
      ok: { type: boolean }
      data:
        type: object
        properties:
          status: { type: integer, description: "HTTP status code." }
  max_request_bytes: 4096
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 3

egress:
  profile: "proxy_allowlist"
  allowed_domains: []

secrets:
  - name: "API_BEARER_TOKEN"
    required: true

risk_level: "high"
verifier_kind: http_status

declared_side_effects:
  - "http_read"
