# gitlab_create_issue — create a GitLab issue.
#
# Medium risk: creates visible work items.

action_id: "gitlab_create_issue"
tags: ["agent", "team"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: POST
  url_template: "https://gitlab.com/api/v4/projects/{{project_id}}/issues"
  headers:
    Content-Type: "application/json"
  body_template:
    title: "{{title}}"
    description: "{{description}}"

io:
  request_schema:
    type: object
    required:
      - project_id
      - title
    additionalProperties: false
    properties:
      project_id:
        type: string
        minLength: 1
        maxLength: 64
        description: "GitLab project ID or URL-encoded path."
      title:
        type: string
        minLength: 1
        maxLength: 256
      description:
        type: string
        maxLength: 65536
        default: ""
  max_request_bytes: 65536
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 3

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "gitlab.com"

secrets:
  - name: "GITLAB_TOKEN"
    required: true

risk_level: "medium"
verifier_kind: http_status

declared_side_effects:
  - "http_write"
