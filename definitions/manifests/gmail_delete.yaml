# gmail_delete — permanently delete or trash a Gmail message.
#
# High risk: irreversible data loss. Requires approval.

action_id: "gmail_delete"
version: "1.0.0"
tags: ["team"]
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: DELETE
  url_template: "https://gmail.googleapis.com/gmail/v1/users/me/messages/{{message_id}}"
  headers:
    Accept: "application/json"

io:
  request_schema:
    type: object
    properties:
      message_id:
        type: string
        minLength: 1
        maxLength: 64
        description: "Gmail message ID to delete."
    required:
      - message_id
    additionalProperties: false
  response_schema:
    type: object
    required: [ok]
    additionalProperties: false
    properties:
      ok: { type: boolean }
      data:
        type: object
        properties:
          status: { type: integer, description: "HTTP status (204 = deleted)." }
  max_request_bytes: 1024
  max_response_bytes: 4096

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 15
  max_io_calls: 3

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "gmail.googleapis.com"

secrets:
  - name: "GOOGLE_ACCESS_TOKEN"
    required: true

risk_level: "high"
verifier_kind: http_status
verification_config:
  required_fields: ["ok"]

declared_side_effects:
  - "http_write"
