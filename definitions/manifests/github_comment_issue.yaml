# github_comment_issue — add a comment to an existing GitHub issue.
#
# Medium risk: publicly visible comment. Budget-controlled.

action_id: "github_comment_issue"
tags: ["agent", "team", "coding"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: POST
  url_template: "https://api.github.com/repos/{{owner}}/{{repo}}/issues/{{issue_number}}/comments"
  headers:
    Accept: "application/vnd.github.v3+json"
  body_template:
    body: "{{body}}"

io:
  request_schema:
    type: object
    properties:
      owner:
        type: string
        minLength: 1
        maxLength: 39
        description: "Repository owner (user or org)."
      repo:
        type: string
        minLength: 1
        maxLength: 100
        description: "Repository name."
      issue_number:
        type: integer
        minimum: 1
        description: "Issue number."
      body:
        type: string
        minLength: 1
        maxLength: 65536
        description: "Comment body (Markdown)."
    required:
      - owner
      - repo
      - issue_number
      - body
    additionalProperties: false
  max_request_bytes: 65536
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 5

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "api.github.com"

secrets:
  - name: "GITHUB_TOKEN"
    required: true

risk_level: "medium"
verifier_kind: http_status

declared_side_effects:
  - "http_write"
