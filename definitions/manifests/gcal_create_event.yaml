# gcal_create_event — create a Google Calendar event.
#
# High risk: creates external calendar entries. Requires human approval.

action_id: "gcal_create_event"
version: "1.0.0"
tags: ["team"]
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: POST
  url_template: "https://www.googleapis.com/calendar/v3/calendars/{{calendar_id}}/events"
  headers:
    Content-Type: "application/json"
  body_template:
    summary: "{{summary}}"
    start: "{{start}}"
    end: "{{end}}"

io:
  request_schema:
    type: object
    required:
      - summary
      - start
      - end
    additionalProperties: false
    properties:
      calendar_id:
        type: string
        minLength: 1
        maxLength: 256
        default: "primary"
        description: "Calendar ID."
      summary:
        type: string
        minLength: 1
        maxLength: 1024
        description: "Event title."
      start:
        type: string
        maxLength: 256
        description: "Start time object JSON, e.g. {\"dateTime\":\"2025-01-01T10:00:00Z\"}"
      end:
        type: string
        maxLength: 256
        description: "End time object JSON."
  response_schema:
    type: object
    required: [ok]
    additionalProperties: false
    properties:
      ok: { type: boolean }
      data:
        type: object
        properties:
          id: { type: string, description: "Created calendar event ID." }
          htmlLink: { type: string, description: "URL to the event in Google Calendar." }
  max_request_bytes: 65536
  max_response_bytes: 65536

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 3

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "www.googleapis.com"

secrets:
  - name: "GOOGLE_ACCESS_TOKEN"
    required: true

risk_level: "high"
verifier_kind: http_status
verification_config:
  required_fields: ["ok", "data"]

declared_side_effects:
  - "http_write"
