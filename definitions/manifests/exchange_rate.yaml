# exchange_rate — fetch current exchange rates.
#
# Low risk: read-only public data. No authentication needed.

action_id: "exchange_rate"
tags: ["research"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: GET
  url_template: "https://open.er-api.com/v6/latest/{{base}}"
  headers:
    Accept: "application/json"

io:
  request_schema:
    type: object
    required:
      - base
    additionalProperties: false
    properties:
      base:
        type: string
        minLength: 3
        maxLength: 3
        pattern: "^[A-Z]{3}$"
        description: "Base currency ISO 4217 code, e.g. USD, EUR, GBP."
  max_request_bytes: 4096
  max_response_bytes: 65536

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 15
  max_io_calls: 3

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "open.er-api.com"

secrets: []

risk_level: "low"
verifier_kind: http_status

declared_side_effects:
  - "http_read"
