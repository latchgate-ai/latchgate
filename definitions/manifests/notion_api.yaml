# notion_api — create or update Notion pages/databases.
#
# Medium risk: writes to Notion workspace. No approval required.

action_id: "notion_api"
version: "1.0.0"
tags: ["agent", "team"]
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: POST
  url_template: "https://api.notion.com/v1/{{endpoint}}"
  headers:
    Content-Type: "application/json"
    Notion-Version: "2022-06-28"
  body_template: "{{body}}"

io:
  request_schema:
    type: object
    properties:
      endpoint:
        type: string
        minLength: 1
        maxLength: 512
        description: "Notion API endpoint, e.g. pages, databases/DB_ID/query"
      body:
        type: string
        maxLength: 262144
        description: "Request body (JSON string)."
    required:
      - endpoint
      - body
    additionalProperties: false
  max_request_bytes: 262144
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 5

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "api.notion.com"

secrets:
  - name: "NOTION_API_KEY"
    required: true

risk_level: "medium"
verifier_kind: http_status

declared_side_effects:
  - "http_write"
