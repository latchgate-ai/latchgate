action_id: "fs_write"
version: "1.0.0"
provider_module_digest: "builtin:fs"
tags: ["agent", "team", "coding"]

# High risk: modifies local source code. Requires human approval.
#
# Risk rationale: modifies local code, hard to undo at scale,
# can alter project behavior. See RISK_MODEL.md.

required_imports:
  - "latchgate:io/fs"
  - "latchgate:io/log"

fs:
  allowed_operations: [create, overwrite]
  allowed_paths:
    - "src/**"
    - "tests/**"
    - "docs/**"
  denied_paths:
    # Secrets / credentials
    - "**/.env"
    - "**/.env.*"
    - "**/secrets/**"
    - "**/.ssh/**"
    - "**/.aws/**"
    - "**/.gcloud/**"
    - "**/.kube/**"

    # Version control
    - "**/.git/**"
    - "**/.gitignore"
    - "**/.gitattributes"

    # CI / pipelines
    - "**/.github/**"
    - "**/.gitlab-ci.yml"
    - "**/.circleci/**"
    - "**/.buildkite/**"
    - "**/Jenkinsfile"
    - "**/azure-pipelines.yml"

    # Container / IaC
    - "**/Dockerfile*"
    - "**/docker-compose*"
    - "**/Makefile"
    - "**/*.tf"
    - "**/*.tfvars"
    - "**/terraform.tfstate*"

    # Package manifests
    - "**/package.json"
    - "**/package-lock.json"
    - "**/pyproject.toml"
    - "**/Cargo.toml"
    - "**/Cargo.lock"
    - "**/go.mod"
    - "**/go.sum"

    # Dependency caches
    - "**/node_modules/**"
    - "**/target/**"
    - "**/.venv/**"
    - "**/__pycache__/**"

    # LatchGate self-protection
    - "**/latchgate.toml"
    - "**/.latchgate/**"
    - "**/policies/**"
  max_file_bytes: 1048576    # 1 MB decoded

io:
  request_schema:
    type: object
    required: [operation, path, content_base64]
    additionalProperties: false
    properties:
      operation:
        type: string
        enum: ["write"]
      path: { type: string, minLength: 1, maxLength: 4096 }
      content_base64:
        type: string
        contentEncoding: "base64"
        maxLength: 1398101       # ⌈1 MB × 4/3⌉
      mode:
        type: string
        enum: ["create", "overwrite"]
        default: "overwrite"
      expected_before_hash:
        type: string
        pattern: "^sha256:[a-f0-9]{64}$"

resource_limits:
  fuel: 1000000
  memory_mb: 64
  timeout_seconds: 10
  max_io_calls: 50
  max_host_response_bytes: 1048576

risk_level: "high"
verifier_kind: fs_hash
declared_side_effects: ["fs_write"]
