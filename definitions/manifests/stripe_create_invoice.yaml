# stripe_create_invoice — create a Stripe invoice.
#
# Critical risk: creates financial obligations. Requires human approval.

action_id: "stripe_create_invoice"
version: "1.0.0"
tags: ["data-pipeline"]
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: POST
  url_template: "https://api.stripe.com/v1/invoices"
  headers:
    Content-Type: "application/x-www-form-urlencoded"

io:
  request_schema:
    type: object
    required:
      - body
    additionalProperties: false
    properties:
      body:
        type: string
        minLength: 1
        maxLength: 65536
        description: "URL-encoded form body, e.g. customer=cus_xxx&collection_method=send_invoice&days_until_due=30"
  response_schema:
    type: object
    required: [ok]
    additionalProperties: false
    properties:
      ok: { type: boolean }
      data:
        type: object
        properties:
          id: { type: string, description: "Stripe invoice ID (inv_...)." }
          status: { type: string, description: "Invoice status (draft, open, paid, etc.)." }
          hosted_invoice_url: { type: string, description: "URL for the hosted invoice page." }
  max_request_bytes: 65536
  max_response_bytes: 65536

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 3

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "api.stripe.com"

secrets:
  - name: "STRIPE_SECRET_KEY"
    required: true

risk_level: "critical"
verifier_kind: http_status
verification_config:
  required_fields: ["ok", "data"]

declared_side_effects:
  - "http_write"
