# bitbucket_pr_merge — merge a Bitbucket pull request.
#
# Critical risk: irreversible change to the target branch. Requires approval.

action_id: "bitbucket_pr_merge"
tags: ["agent", "team"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: POST
  url_template: "https://api.bitbucket.org/2.0/repositories/{{workspace}}/{{repo_slug}}/pullrequests/{{pull_request_id}}/merge"
  headers:
    Content-Type: "application/json"
    Accept: "application/json"
  body_template:
    type: "{{merge_strategy}}"
    close_source_branch: "{{close_source_branch}}"
    message: "{{message}}"

io:
  request_schema:
    type: object
    required:
      - workspace
      - repo_slug
      - pull_request_id
    additionalProperties: false
    properties:
      workspace:
        type: string
        minLength: 1
        maxLength: 128
        description: "Bitbucket workspace slug."
      repo_slug:
        type: string
        minLength: 1
        maxLength: 128
        description: "Repository slug."
      pull_request_id:
        type: integer
        minimum: 1
        description: "Pull request ID."
      merge_strategy:
        type: string
        enum:
          - "merge_commit"
          - "squash"
          - "fast_forward"
        default: "merge_commit"
        description: "Merge strategy."
      close_source_branch:
        type: boolean
        default: false
        description: "Delete source branch after merge."
      message:
        type: string
        maxLength: 256
        default: ""
        description: "Custom merge commit message."
  response_schema:
    type: object
    required: [ok]
    additionalProperties: false
    properties:
      ok: { type: boolean }
      data:
        type: object
        properties:
          state: { type: string, description: "PR state after merge." }
          merge_commit:
            type: object
            properties:
              hash: { type: string, description: "Merge commit hash." }
  max_request_bytes: 4096
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 5

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "api.bitbucket.org"

secrets:
  - name: "BITBUCKET_TOKEN"
    required: true

risk_level: "critical"
verifier_kind: http_status
verification_config:
  required_fields: ["ok", "data"]

declared_side_effects:
  - "http_write"
