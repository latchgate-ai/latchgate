# datadog_read — read Datadog metrics, monitors, and events.
#
# Low risk: read-only access to monitoring data. Stable API domain.
# Operators using EU Datadog should add api.datadoghq.eu via domain learning.

action_id: "datadog_read"
tags: ["devops", "data-pipeline"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: GET
  url_template: "https://api.datadoghq.com/api/{{endpoint}}"
  headers:
    Accept: "application/json"

io:
  request_schema:
    type: object
    required:
      - endpoint
    additionalProperties: false
    properties:
      endpoint:
        type: string
        minLength: 1
        maxLength: 512
        description: "Datadog API path, e.g. v1/monitor, v2/metrics, v1/events"
  max_request_bytes: 4096
  max_response_bytes: 2097152

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 10

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "api.datadoghq.com"

secrets:
  - name: "DD_API_KEY"
    required: true
  - name: "DD_APP_KEY"
    required: true

risk_level: "low"
verifier_kind: http_status

declared_side_effects:
  - "http_read"
