# stripe_read — read Stripe financial data (charges, customers, invoices).
#
# High risk: accesses financial PII. Requires human approval.
# Read-only GET requests only.

action_id: "stripe_read"
version: "1.0.0"
tags: ["data-pipeline"]
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: GET
  url_template: "https://api.stripe.com/v1/{{endpoint}}"
  headers:
    Accept: "application/json"

io:
  request_schema:
    type: object
    properties:
      endpoint:
        type: string
        minLength: 1
        maxLength: 512
        description: "Stripe API endpoint, e.g. charges, customers/cus_xxx"
    required:
      - endpoint
    additionalProperties: false
  response_schema:
    type: object
    required: [ok]
    additionalProperties: false
    properties:
      ok: { type: boolean }
      data:
        type: object
        properties:
          object: { type: string, description: "Stripe object type." }
  max_request_bytes: 4096
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 3

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "api.stripe.com"

secrets:
  - name: "STRIPE_SECRET_KEY"
    required: true

risk_level: "high"
verifier_kind: http_status

declared_side_effects:
  - "http_read"
