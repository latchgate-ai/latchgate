# cloudflare_dns_create — create a DNS record in Cloudflare.
#
# High risk: modifies DNS infrastructure. Requires approval.

action_id: "cloudflare_dns_create"
version: "1.0.0"
tags: ["devops"]
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: POST
  url_template: "https://api.cloudflare.com/client/v4/zones/{{zone_id}}/dns_records"
  headers:
    Content-Type: "application/json"
  body_template:
    type: "{{record_type}}"
    name: "{{name}}"
    content: "{{content}}"
    ttl: "{{ttl}}"
    proxied: "{{proxied}}"

io:
  request_schema:
    type: object
    properties:
      zone_id:
        type: string
        minLength: 1
        maxLength: 64
        description: "Cloudflare zone ID."
      record_type:
        type: string
        enum:
          - A
          - AAAA
          - CNAME
          - TXT
          - MX
          - NS
          - SRV
        description: "DNS record type."
      name:
        type: string
        minLength: 1
        maxLength: 255
        description: "DNS record name (e.g. 'api.example.com')."
      content:
        type: string
        minLength: 1
        maxLength: 2048
        description: "Record value (IP address, hostname, TXT content, etc.)."
      ttl:
        type: integer
        minimum: 1
        maximum: 86400
        default: 3600
        description: "TTL in seconds. Use 1 for 'automatic'."
      proxied:
        type: boolean
        default: false
        description: "Whether to proxy through Cloudflare."
    required:
      - zone_id
      - record_type
      - name
      - content
    additionalProperties: false
  response_schema:
    type: object
    required: [ok]
    additionalProperties: false
    properties:
      ok: { type: boolean }
      data:
        type: object
        properties:
          id: { type: string, description: "Created DNS record ID." }
          name: { type: string, description: "DNS record name." }
          type: { type: string, description: "DNS record type (A, CNAME, etc.)." }
  max_request_bytes: 4096
  max_response_bytes: 8192

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 15
  max_io_calls: 3

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "api.cloudflare.com"

secrets:
  - name: "CLOUDFLARE_API_TOKEN"
    required: true

risk_level: "high"
verifier_kind: http_status
verification_config:
  required_fields: ["ok", "data"]

declared_side_effects:
  - "http_write"
