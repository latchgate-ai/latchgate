# gitlab_mr_create — create a GitLab merge request.
#
# High risk: creates MRs visible to project members. Requires approval.

action_id: "gitlab_mr_create"
tags: ["agent", "team"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: POST
  url_template: "https://gitlab.com/api/v4/projects/{{project_id}}/merge_requests"
  headers:
    Content-Type: "application/json"
  body_template:
    title: "{{title}}"
    description: "{{description}}"
    source_branch: "{{source_branch}}"
    target_branch: "{{target_branch}}"

io:
  request_schema:
    type: object
    required:
      - project_id
      - title
      - source_branch
      - target_branch
    additionalProperties: false
    properties:
      project_id:
        type: string
        minLength: 1
        maxLength: 64
        description: "GitLab project ID or URL-encoded path."
      title:
        type: string
        minLength: 1
        maxLength: 256
      description:
        type: string
        maxLength: 65536
        default: ""
      source_branch:
        type: string
        minLength: 1
        maxLength: 256
        description: "Branch containing changes."
      target_branch:
        type: string
        minLength: 1
        maxLength: 256
        description: "Branch to merge into."
  response_schema:
    type: object
    required: [ok]
    additionalProperties: false
    properties:
      ok: { type: boolean }
      data:
        type: object
        properties:
          iid: { type: integer, description: "Merge request IID." }
          web_url: { type: string, description: "URL of the created MR." }
  max_request_bytes: 65536
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 3

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "gitlab.com"

secrets:
  - name: "GITLAB_TOKEN"
    required: true

risk_level: "high"
verifier_kind: http_status
verification_config:
  required_fields: ["ok", "data"]

declared_side_effects:
  - "http_write"
