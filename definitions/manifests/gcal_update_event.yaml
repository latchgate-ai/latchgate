# gcal_update_event — update an existing Google Calendar event.
#
# High risk: modifies calendar entries that may involve other attendees.
# Requires approval.

action_id: "gcal_update_event"
version: "1.0.0"
tags: ["team"]
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: PUT
  url_template: "https://www.googleapis.com/calendar/v3/calendars/{{calendar_id}}/events/{{event_id}}"
  headers:
    Content-Type: "application/json"
  body_template:
    summary: "{{summary}}"
    start: "{{start}}"
    end: "{{end}}"

io:
  request_schema:
    type: object
    properties:
      calendar_id:
        type: string
        minLength: 1
        maxLength: 256
        default: "primary"
        description: "Calendar ID. Use 'primary' for the user's default calendar."
      event_id:
        type: string
        minLength: 1
        maxLength: 256
        description: "Event ID to update."
      summary:
        type: string
        minLength: 1
        maxLength: 512
        description: "Event title."
      start:
        type: string
        maxLength: 256
        description: "Start time (JSON string, e.g. {\"dateTime\":\"...\",\"timeZone\":\"...\"})."
      end:
        type: string
        maxLength: 256
        description: "End time (JSON string)."
    required:
      - event_id
      - summary
      - start
      - end
    additionalProperties: false
  response_schema:
    type: object
    required: [ok]
    additionalProperties: false
    properties:
      ok: { type: boolean }
      data:
        type: object
        properties:
          id: { type: string, description: "Updated calendar event ID." }
          updated: { type: string, description: "Last modification timestamp." }
  max_request_bytes: 16384
  max_response_bytes: 65536

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 15
  max_io_calls: 3

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "www.googleapis.com"

secrets:
  - name: "GOOGLE_ACCESS_TOKEN"
    required: true

risk_level: "high"
verifier_kind: http_status
verification_config:
  required_fields: ["ok", "data"]

declared_side_effects:
  - "http_write"
