# google_tasks_update — update an existing Google Tasks entry.
#
# Medium risk: modifies task content and due dates. Budget-controlled.

action_id: "google_tasks_update"
version: "1.0.0"
tags: ["agent", "team"]
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: PATCH
  url_template: "https://tasks.googleapis.com/tasks/v1/lists/{{tasklist}}/tasks/{{task_id}}"
  headers:
    Content-Type: "application/json"
  body_template:
    title: "{{title}}"
    notes: "{{notes}}"
    due: "{{due}}"
    status: "{{status}}"

io:
  request_schema:
    type: object
    required:
      - tasklist
      - task_id
    additionalProperties: false
    properties:
      tasklist:
        type: string
        minLength: 1
        maxLength: 256
        default: "@default"
        description: "Task list ID. Use '@default' for the user's default list."
      task_id:
        type: string
        minLength: 1
        maxLength: 256
        description: "Task ID to update."
      title:
        type: string
        maxLength: 1024
        default: ""
        description: "Updated task title."
      notes:
        type: string
        maxLength: 8192
        default: ""
        description: "Updated task notes."
      due:
        type: string
        maxLength: 64
        default: ""
        description: "Updated due date in RFC 3339 format."
      status:
        type: string
        enum:
          - "needsAction"
          - "completed"
        default: ""
        description: "Task status."
  max_request_bytes: 16384
  max_response_bytes: 8192

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 15
  max_io_calls: 3

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "tasks.googleapis.com"

secrets:
  - name: "GOOGLE_ACCESS_TOKEN"
    required: true

risk_level: "medium"
verifier_kind: http_status

declared_side_effects:
  - "http_write"
