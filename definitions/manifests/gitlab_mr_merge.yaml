# gitlab_mr_merge — merge a GitLab merge request.
#
# Critical risk: irreversible change to the target branch. Requires approval.

action_id: "gitlab_mr_merge"
tags: ["agent", "team"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: PUT
  url_template: "https://gitlab.com/api/v4/projects/{{project_id}}/merge_requests/{{merge_request_iid}}/merge"
  headers:
    Content-Type: "application/json"
  body_template:
    squash: "{{squash}}"
    merge_commit_message: "{{merge_commit_message}}"

io:
  request_schema:
    type: object
    required:
      - project_id
      - merge_request_iid
    additionalProperties: false
    properties:
      project_id:
        type: string
        minLength: 1
        maxLength: 64
        description: "GitLab project ID or URL-encoded path."
      merge_request_iid:
        type: integer
        minimum: 1
        description: "Merge request IID."
      squash:
        type: boolean
        default: false
        description: "Squash commits on merge."
      merge_commit_message:
        type: string
        maxLength: 256
        default: ""
        description: "Custom merge commit message."
  response_schema:
    type: object
    required: [ok]
    additionalProperties: false
    properties:
      ok: { type: boolean }
      data:
        type: object
        properties:
          state: { type: string, description: "MR state after merge." }
          merge_commit_sha: { type: string, description: "Merge commit SHA." }
  max_request_bytes: 4096
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 5

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "gitlab.com"

secrets:
  - name: "GITLAB_TOKEN"
    required: true

risk_level: "critical"
verifier_kind: http_status
verification_config:
  required_fields: ["ok", "data"]

declared_side_effects:
  - "http_write"
