# asana_delete — delete an Asana task.
#
# High risk: irreversible removal of work items. Requires approval.

action_id: "asana_delete"
tags: ["agent", "team"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: DELETE
  url_template: "https://app.asana.com/api/1.0/tasks/{{task_id}}"
  headers:
    Accept: "application/json"

io:
  request_schema:
    type: object
    required:
      - task_id
    additionalProperties: false
    properties:
      task_id:
        type: string
        minLength: 1
        maxLength: 64
        description: "Asana task GID to delete."
  response_schema:
    type: object
    required: [ok]
    additionalProperties: false
    properties:
      ok: { type: boolean }
      data:
        type: object
        properties:
          gid: { type: string, description: "Deleted task GID." }
  max_request_bytes: 1024
  max_response_bytes: 4096

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 3

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "app.asana.com"

secrets:
  - name: "ASANA_ACCESS_TOKEN"
    required: true

risk_level: "high"
verifier_kind: http_status
verification_config:
  required_fields: ["ok"]

declared_side_effects:
  - "http_write"
