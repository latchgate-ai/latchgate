# gmail_send — send an email via Gmail API.
#
# High risk: sends email to external recipients. Requires human approval.

action_id: "gmail_send"
version: "1.0.0"
tags: ["team"]
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: POST
  url_template: "https://gmail.googleapis.com/gmail/v1/users/me/messages/send"
  headers:
    Content-Type: "application/json"

io:
  request_schema:
    type: object
    required:
      - raw
    additionalProperties: false
    properties:
      raw:
        type: string
        minLength: 1
        maxLength: 5242880
        description: "Base64url-encoded RFC 2822 email message."
  response_schema:
    type: object
    required: [ok]
    additionalProperties: false
    properties:
      ok: { type: boolean }
      data:
        type: object
        properties:
          id: { type: string, description: "Gmail message ID of the sent message." }
          threadId: { type: string, description: "Thread ID the message belongs to." }
  max_request_bytes: 5242880
  max_response_bytes: 65536

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 3

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "gmail.googleapis.com"

secrets:
  - name: "GOOGLE_ACCESS_TOKEN"
    required: true

risk_level: "high"
verifier_kind: http_status
verification_config:
  required_fields: ["ok", "data"]

declared_side_effects:
  - "http_write"
