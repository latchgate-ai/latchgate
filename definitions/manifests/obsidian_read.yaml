# obsidian_read — read notes from Obsidian via Local REST API plugin.
#
# Low risk: read-only local access. Requires Obsidian Local REST API plugin.

action_id: "obsidian_read"
tags: ["team", "research"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: GET
  url_template: "http://localhost:27124/{{endpoint}}"
  headers:
    Accept: "application/json"

io:
  request_schema:
    type: object
    required:
      - endpoint
    additionalProperties: false
    properties:
      endpoint:
        type: string
        minLength: 1
        maxLength: 512
        description: "Obsidian REST API path, e.g. vault/MyNote.md, search/simple/?query=foo"
  max_request_bytes: 4096
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 15
  max_io_calls: 10

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "localhost"

secrets:
  - name: "OBSIDIAN_API_KEY"
    required: false

risk_level: "low"
verifier_kind: http_status

declared_side_effects:
  - "http_read"
