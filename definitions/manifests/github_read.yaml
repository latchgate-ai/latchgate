# github_read — read-only GitHub API access via template action.
#
# Low risk: read-only GET against api.github.com. No approval required.
# Demonstrates template actions with scoped domain egress.

action_id: "github_read"
tags: ["agent", "team", "research", "coding"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: GET
  url_template: "https://api.github.com/{{path}}"
  headers:
    Accept: "application/vnd.github.v3+json"

io:
  request_schema:
    type: object
    properties:
      path:
        type: string
        minLength: 1
        maxLength: 512
        description: "API path, e.g. repos/torvalds/linux/commits"
    required:
      - path
    additionalProperties: false
  max_request_bytes: 4096
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 5

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "api.github.com"

secrets:
  - name: "GITHUB_TOKEN"
    required: false

risk_level: "low"
verifier_kind: http_status

declared_side_effects:
  - "http_read"
