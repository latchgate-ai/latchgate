# http_post — generic HTTP POST action.
#
# Medium risk: writes data to external services.
# Egress: proxy_allowlist — scoped by operator-configured domains.
#
# Risk rationale: write to one external endpoint, operator-scoped.
#
# Generic action — ships with empty allowed_domains.
# Operators must configure domains for their environment.
# See manifests/_examples/http_post.yaml for a demo configuration.

action_id: "http_post"
tags: ["agent", "team"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: POST
  url_template: "{{url}}"
  headers:
    Content-Type: "application/json"
  body_template: "{{body}}"

io:
  request_schema:
    type: object
    properties:
      url:
        type: string
        format: uri
        minLength: 1
        maxLength: 2048
        description: "Target URL for the POST request."
      body:
        type: string
        maxLength: 262144
        description: "Request body (JSON string)."
    required:
      - url
      - body
    additionalProperties: false
  max_request_bytes: 262144
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 10

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "httpbin.org"

secrets: []

risk_level: "medium"
verifier_kind: http_status

declared_side_effects:
  - "http_write"
