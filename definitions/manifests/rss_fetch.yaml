# rss_fetch — fetch RSS/Atom feeds from arbitrary domains.
#
# Low risk: read-only. RSS feeds come from many domains — domain learning
# is the expected pattern here.

action_id: "rss_fetch"
tags: ["research"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: GET
  url_template: "{{url}}"
  headers:
    Accept: "application/rss+xml, application/atom+xml, application/xml, text/xml"
    User-Agent: "LatchGate/1.0"

io:
  request_schema:
    type: object
    required:
      - url
    additionalProperties: false
    properties:
      url:
        type: string
        format: uri
        minLength: 1
        maxLength: 2048
        description: "RSS or Atom feed URL."
  max_request_bytes: 4096
  max_response_bytes: 2097152

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 5

egress:
  profile: "proxy_allowlist"
  allowed_domains: []

secrets: []

risk_level: "low"
verifier_kind: http_status

declared_side_effects:
  - "http_read"
