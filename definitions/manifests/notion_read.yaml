# notion_read — read Notion pages, databases, and blocks.
#
# Low risk: read-only access to Notion workspace.

action_id: "notion_read"
version: "1.0.0"
tags: ["agent", "team", "research"]
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: GET
  url_template: "https://api.notion.com/v1/{{endpoint}}"
  headers:
    Accept: "application/json"
    Notion-Version: "2022-06-28"

io:
  request_schema:
    type: object
    required:
      - endpoint
    additionalProperties: false
    properties:
      endpoint:
        type: string
        minLength: 1
        maxLength: 512
        description: "Notion API path, e.g. pages/PAGE_ID, databases/DB_ID, blocks/BLOCK_ID/children"
  max_request_bytes: 4096
  max_response_bytes: 2097152

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 30
  max_io_calls: 10

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "api.notion.com"

secrets:
  - name: "NOTION_API_KEY"
    required: true

risk_level: "low"
verifier_kind: http_status

declared_side_effects:
  - "http_read"
