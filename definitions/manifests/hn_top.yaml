# hn_top — read Hacker News top stories and items via Firebase API.
#
# Low risk: read-only.

action_id: "hn_top"
tags: ["research"]
version: "1.0.0"
provider_module_digest: "builtin:http_api"

required_imports:
  - "latchgate:io/http"
  - "latchgate:io/log"
template:
  method: GET
  url_template: "https://hacker-news.firebaseio.com/v0/{{endpoint}}.json"
  headers:
    Accept: "application/json"

io:
  request_schema:
    type: object
    required:
      - endpoint
    additionalProperties: false
    properties:
      endpoint:
        type: string
        minLength: 1
        maxLength: 256
        description: "HN API endpoint, e.g. topstories, item/12345, user/dang"
  max_request_bytes: 4096
  max_response_bytes: 1048576

resource_limits:
  fuel: 5000000
  memory_mb: 128
  timeout_seconds: 15
  max_io_calls: 10

egress:
  profile: "proxy_allowlist"
  allowed_domains:
    - "hacker-news.firebaseio.com"

secrets: []

risk_level: "low"
verifier_kind: http_status

declared_side_effects:
  - "http_read"
