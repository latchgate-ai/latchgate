name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-Dwarnings"
  RUST_TOOLCHAIN: "1.93"

jobs:
  integration:
    name: Integration, conformance & OPA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-wasip2

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "ci-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}"
          save-if: false

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      # No Rust, no infra — run first for fast feedback.
      - name: OPA policy tests
        run: make test-opa

      - name: Build providers
        run: make providers

      - name: Build test fixtures
        run: make test-fixtures

      - name: Start dev stack
        run: make dev

      - name: Integration tests
        run: cargo test --locked -p latchgate-tests --test integration --no-fail-fast

      - name: Conformance tests
        run: cargo test --locked -p latchgate-tests --test standalone wasm_conformance --no-fail-fast

      - name: Teardown
        if: always()
        run: docker compose --profile dev down 2>/dev/null || true
