name: CodSpeed Benchmarks

on:
  push:
    branches: [main]
  pull_request:
  # Allows CodSpeed to trigger backtest analysis for initial baseline data.
  workflow_dispatch:

concurrency:
  group: codspeed-${{ github.head_ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  id-token: write # required for OIDC authentication with CodSpeed

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_TOOLCHAIN: "1.93"

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-wasip2

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "ci-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}"
          save-if: false

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: Install cargo-codspeed
        run: cargo install cargo-codspeed --locked

      # Required by bench_wasm_instantiation (embedded http_api provider).
      - name: Build providers
        run: make providers

      - name: Fix target permissions
        run: sudo chown -R $(id -u):$(id -g) target/

      - name: Build benchmark target
        run: cargo codspeed build -p latchgate-stress

      - name: Run benchmarks
        uses: CodSpeedHQ/action@22143496e9f3b1d2a5224397c7f0e93cc1f5219c # v4
        with:
          mode: simulation
          run: cargo codspeed run
