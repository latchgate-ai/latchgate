name: Fuzz

on:
  push:
    branches: [main]
    paths:
      - "crates/latchgate-core/src/**"
      - "fuzz/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "crates/latchgate-core/src/**"
      - "fuzz/**"
      - "Cargo.toml"
      - "Cargo.lock"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      duration:
        description: "Fuzz duration per target (seconds)"
        required: false
        default: "300"
        type: string

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FUZZ_SECONDS: >-
    ${{
      github.event_name == 'schedule' && '1800' ||
      github.event.inputs.duration ||
      '300'
    }}

jobs:
  # Push & PRs: compile-only — catches export-path drift without burning 6×60s.
  build-check:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    name: Fuzz build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: fuzz-${{ runner.os }}
          save-if: false

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@25435dc8dd3baed7417e0c96d3fe89013a5b2e09 # v2
        with:
          tool: cargo-fuzz

      - name: Build all fuzz targets
        run: cd fuzz && cargo +nightly fuzz build --target x86_64-unknown-linux-gnu

  # Nightly / dispatch: compile and run.
  fuzz:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - canonical_hash
          - manifest_domain_entry
          - parse_host_from_url
          - path_glob_match
          - ip_classification
          - domain_allowlist_match
        include:
          - target: canonical_hash
            dict: json.dict
          - target: manifest_domain_entry
            dict: domain.dict
          - target: parse_host_from_url
            dict: url.dict
          - target: path_glob_match
            dict: glob.dict
          - target: ip_classification
            dict: ip.dict
          - target: domain_allowlist_match
            dict: domain.dict

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@25435dc8dd3baed7417e0c96d3fe89013a5b2e09 # v2
        with:
          tool: cargo-fuzz

      - name: Restore corpus
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Restore build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            fuzz/target
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: fuzz-build-${{ runner.os }}-${{ hashFiles('fuzz/Cargo.toml', 'Cargo.lock') }}
          restore-keys: |
            fuzz-build-${{ runner.os }}-

      - name: Run fuzzer
        run: |
          cd fuzz
          cargo +nightly fuzz run "${{ matrix.target }}" \
            --target x86_64-unknown-linux-gnu \
            -- \
            -max_total_time="${{ env.FUZZ_SECONDS }}" \
            -dict="dictionaries/${{ matrix.dict }}"

      - name: Minimize corpus
        if: success()
        run: cd fuzz && cargo +nightly fuzz cmin "${{ matrix.target }}" --target x86_64-unknown-linux-gnu

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          retention-days: 14
